name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  GODOT_VERSION: "4.7.1"
  GAME_DIR: "game"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: pip install "gdtoolkit==4.*"
      - name: gdformat --check
        run: gdformat --check $(find $GAME_DIR -name "*.gd" -not -path "*/addons/*")
      - name: gdlint
        run: gdlint $(find $GAME_DIR -name "*.gd" -not -path "*/addons/*")

  test:
    runs-on: ubuntu-latest
    needs: lint
    container:
      image: barichello/godot-ci:4.7.1
    steps:
      - uses: actions/checkout@v4
      - name: Import project
        run: godot --headless --path $GAME_DIR --import
      - name: Run GUT tests
        run: godot --headless --audio-driver Dummy --path $GAME_DIR -s addons/gut/gut_cmdln.gd -gdir=res://tests -gexit

  export-web:
    runs-on: ubuntu-latest
    needs: test
    container:
      image: barichello/godot-ci:4.7.1
    steps:
      - uses: actions/checkout@v4
      - name: Setup export templates
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
      - name: Import project
        run: godot --headless --path $GAME_DIR --import
      - name: Create web export dir
        run: mkdir -v -p build/web
      - name: Export web build
        run: godot --headless --path $GAME_DIR --export-release "Web" ../build/web/index.html
      - name: Report build size
        run: du -sh build/web
      - uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web
          retention-days: 30

      # Deploy opcional para itch.io — só roda se o secret BUTLER_API_KEY existir.
      # Configurar em Settings > Secrets do repo quando a página itch.io for criada (docs/11-PROMPT-1.md).
      - name: Deploy to itch.io
        if: ${{ github.ref == 'refs/heads/main' && env.BUTLER_API_KEY != '' }}
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        uses: yeslayla/butler-publish-itchio-action@v1.2.0
        with:
          butlerApiKey: ${{ secrets.BUTLER_API_KEY }}
          gameData: build/web
          itchUsername: CHANGE_ME
          itchGameId: murilo-blocks-game
          buildChannel: web
